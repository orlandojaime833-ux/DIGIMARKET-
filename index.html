/* ── Modal ── */

<body>
<div id="root"></div>
<div id="modal-ct"></div>

<script>
const SB_URL = CONFIG.SUPABASE_URL;
const SB_ANON = CONFIG.SUPABASE_ANON;
const API = CONFIG.API_URL;
const ADMINS = CONFIG.ADMINS;
const sb = supabase.createClient(SB_URL, SB_ANON);

// ── Estado global ──────────────────────────────────────
let user=null, role='guest', lojista=null, afiliado=null;
let page='login', tab='overview';
let planos=[], currencies=[], selPlano=null, selCurrency=null;
let invoiceData=null, checkoutStep=0, pollInterval=null;
let aiHistorico=[], aiCarregando=false;

// ── Auth ───────────────────────────────────────────────
sb.auth.onAuthStateChange(async(ev,sess)=>{
  user=sess?.user||null;
  if(user){
    await detectarRole();
    goTo('dashboard');
  } else {
    role='guest'; lojista=null; afiliado=null;
    renderRoot();
  }
});

async function detectarRole(){
  if(ADMINS.includes(user.email)){ role='admin'; return; }
  // Verificar se é afiliado
  const{data:af}=await sb.from('afiliados').select('id').eq('user_id',user.id).single();
  if(af){ role='afiliado'; await loadAfiliado(); return; }
  // Por defeito é lojista
  role='lojista';
  await loadLojista();
}

async function loadLojista(){
  try{const r=await apiCall('GET','/api/lojista/me');if(r.success)lojista=r.lojista;}catch(e){}
}

async function loadAfiliado(){
  try{const r=await apiCall('GET','/api/afiliado/me');if(r.success)afiliado=r;}catch(e){}
}

async function apiCall(method,path,body,timeoutMs=8000){
  const{data:{session}}=await sb.auth.getSession();
  const h={'Content-Type':'application/json'};
  if(session?.access_token)h['Authorization']='Bearer '+session.access_token;
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const r=await fetch(API+path,{method,headers:h,signal:ctrl.signal,body:body?JSON.stringify(body):undefined});
    clearTimeout(tid);
    return r.json();
  }catch(e){
    clearTimeout(tid);
    if(e.name==='AbortError') return{success:false,error:'Servidor a acordar... tenta novamente em 10s'};
    throw e;
  }
}

// ── Cache local simples ──────────────────────────────────
const _cache={};
function cacheSet(k,v){_cache[k]={v,ts:Date.now()};}
function cacheGet(k,maxAgeMs=300000){const c=_cache[k];return(c&&Date.now()-c.ts<maxAgeMs)?c.v:null;}

// ── Keep-alive: ping ao Render a cada 4 min ──────────────
setInterval(()=>fetch(API+'/health',{method:'GET'}).catch(()=>{}), 240000);

async function doLogout(){
  await sb.auth.signOut();
  user=null;role='guest';lojista=null;afiliado=null;
  page='login';renderRoot();
}

function goTo(p,t){
  page=p;
  if(t)tab=t;
  renderRoot();
}

// ════════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ════════════════════════════════════════════════════════
function renderRoot(){
  const root=document.getElementById('root');
  if(!user||page==='login'){root.innerHTML=rLogin();return;}
  if(page==='checkout'){root.innerHTML=rCheckout();afterRender();return;}

  const navItems=getNavItems();
  const activeNav=navItems.find(n=>n.id===tab)||navItems[0];

  root.innerHTML=`
  <div class="app">
    ${rSidebar(navItems)}
    <div class="main">
      ${rTopbar(activeNav?.label||'Dashboard')}
      <div class="content" id="ct">
        <div style="text-align:center;padding:40px"><div class="spin" style="width:30px;height:30px;border-width:3px;margin:0 auto"></div></div>
      </div>
    </div>
  </div>`;
  afterRender();
}

function getNavItems(){
  if(role==='admin') return [
    {id:'overview',icon:'📊',label:'Visão Geral'},
    {id:'lojistas',icon:'🏪',label:'Lojistas'},
    {id:'afiliados',icon:'🤝',label:'Afiliados'},
    {id:'saques',icon:'💸',label:'Saques'},
    {id:'carteira',icon:'💎',label:'Carteira xRocket'},
    {id:'config',icon:'⚙️',label:'Configurações'},
    {id:'ai',icon:'🤖',label:'IA Assistente',badge:'AI'},
  ];
  if(role==='afiliado') return [
    {id:'overview',icon:'📊',label:'Visão Geral'},
    {id:'links',icon:'🔗',label:'Os meus Links'},
    {id:'comissoes',icon:'💰',label:'Comissões'},
    {id:'saques',icon:'💸',label:'Saques'},
    {id:'marketing',icon:'📣',label:'Recursos VIP'},
    {id:'ai',icon:'🤖',label:'IA Marketing',badge:'VIP'},
    {id:'config',icon:'⚙️',label:'Configurações'},
  ];
  return [

  ct.innerHTML=skeletonHTML();
  const renders={

    produtos:rProdutos,analytics:rAnalytics,automacoes:rAutomacoes,

async function doLogin(){
  const e=document.getElementById('ae')?.value,p=document.getElementById('ap')?.value;
  const{error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error){const el=document.getElementById('auth-err');if(el)el.textContent=error.message;}
}
async function doRegister(){
  const e=document.getElementById('ae')?.value,p=document.getElementById('ap')?.value;
  if((p||'').length<6){const el=document.getElementById('auth-err');if(el)el.textContent='Password deve ter pelo menos 6 caracteres';return;}
  const{error}=await sb.auth.signUp({email:e,password:p});
  const msg=document.getElementById('auth-msg');
  if(error&&msg)msg.innerHTML=`<div class="alert a-red"><span>✕</span>${error.message}</div>`;
  else if(msg)msg.innerHTML=`<div class="alert a-green"><span>✓</span>Conta criada! Verifica o teu e-mail.</div>`;
}

async function gerarDescricaoModalIA(){
  const nome=document.getElementById('pn')?.value;
  const cat=document.getElementById('pc')?.value;
  const preco=document.getElementById('ppr')?.value;
  if(!nome){document.getElementById('p-err').textContent='Introduz o nome do produto primeiro';return;}
  const btn=document.querySelector('#modal-ct .btn-ai');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spin"></div> Gerando...';}
  const r=await apiCall('POST','/api/ai/descricao',{nome,categoria:cat,preco});
  if(r.success){
    const pd=document.getElementById('pd');
    if(pd)pd.value=r.descricao||'';
  }
  if(btn){btn.disabled=false;btn.innerHTML='🤖 Gerar Descrição com IA';}
}

async function saveProduto(id){
  const nome=document.getElementById('pn')?.value;
  const link_externo=document.getElementById('pl')?.value;
  const provedor=document.getElementById('pp')?.value;
  const preco=document.getElementById('ppr')?.value;
  const categoria=document.getElementById('pc')?.value;
  const descricao=document.getElementById('pd')?.value;
  const img=document.getElementById('pi')?.value;
  if(!nome||!link_externo){document.getElementById('p-err').textContent='Nome e link são obrigatórios';return;}
  const method=id?'PUT':'POST';
  const path=id?`/api/produtos/${id}`:'/api/produtos';
  const r=await apiCall(method,path,{nome,link_externo,provedor,preco:preco?parseFloat(preco):null,categoria,descricao,imagens:img?[img]:[]});
  if(r.success){closeModal();renderRoot();}
  else{const el=document.getElementById('p-err');if(el)el.textContent=r.error;}
}

// ── TON Connect ──────────────────────────────────────────
async function pagarTonConnect(refAfiliado){
  const btn = document.getElementById('tc-btn');
  if(btn){ btn.disabled=true; btn.innerHTML='<div class="spin"></div> A ligar...'; }
  try {
    // Criar registo de pagamento pendente
    const r = await apiCall('POST', '/api/pagamento/ton-connect/iniciar', { ref_afiliado: refAfiliado||null });
    if(!r.success){ throw new Error(r.error||'Erro ao iniciar'); }
    invoiceData = r;

    // Usar TonConnect SDK via CDN (carregado abaixo)
    if(typeof TonConnectUI !== 'undefined'){
      const tonConnect = new TonConnectUI.TonConnectUI({
        manifestUrl: `${CONFIG.FRONTEND_URL}/tonconnect-manifest.json`,
        buttonRootId: null,
      });
      const tx = {
        validUntil: Math.floor(Date.now()/1000) + 600,
        messages:[{
          address: TON_WALLET_DESTINO,
          amount:  '1000000000', // 1 TON em nanotons
          payload: r.memo_b64 || '',
        }]
      };
      await tonConnect.sendTransaction(tx);
      // Pagamento enviado — polling automático
      checkoutMode='tonconnect'; checkoutStep=2;
      renderRoot();
      iniciarPollingVerificacao(r.pagamento_id);
    } else {
      // Fallback: abrir deep link do Tonkeeper
      const deepLink = `https://app.tonkeeper.com/transfer/${encodeURIComponent(TON_WALLET_DESTINO)}?amount=1000000000&text=${encodeURIComponent(r.memo||'3DS')}`;
      window.open(deepLink, '_blank');
      // Tratar como manual a partir daqui
      invoiceData = r;
      checkoutMode = 'tonconnect';
      checkoutStep = 2;
      renderRoot();
      iniciarPollingVerificacao(r.pagamento_id);
    }
  } catch(e){
    const el = document.getElementById('checkout-err');
    if(el) el.textContent = e.message||'Erro ao ligar carteira';
    if(btn){ btn.disabled=false; btn.innerHTML='💎 Ligar Carteira e Pagar'; }
  }
}

function mostrarPagamentoManual(ref){

async function confirmarPagamentoManual(refAfiliado){
  const carteira = document.getElementById('manual-wallet')?.value?.trim();
  const errEl    = document.getElementById('manual-err');
  if(!carteira){ errEl.textContent='Introduz o endereço da tua carteira TON'; return; }
  if(!carteira.startsWith('UQ') && !carteira.startsWith('EQ')){
    errEl.textContent='Endereço inválido. Deve começar com UQ ou EQ'; return;
  }
  const btn = document.getElementById('manual-btn');
  if(btn){ btn.disabled=true; btn.innerHTML='<div class="spin"></div> A registar...'; }
  errEl.textContent='';

  const r = await apiCall('POST', '/api/pagamento/manual/registar', {
    carteira_remetente: carteira,
    ref_afiliado: refAfiliado||null,
  });
  if(!r.success){
    errEl.textContent = r.error||'Erro ao registar';
    if(btn){ btn.disabled=false; btn.textContent='✓ Já enviei — Verificar Pagamento'; }
    return;
  }
  invoiceData    = { ...r, carteira_remetente: carteira };
  checkoutMode   = 'manual';
  checkoutStep   = 2;
  renderRoot();
  iniciarPollingVerificacao(r.pagamento_id);
}

function iniciarPollingVerificacao(pagamentoId){
  if(pollInterval) clearInterval(pollInterval);
  let tentativas = 0;
  pollInterval = setInterval(async()=>{
    tentativas++;
    const msgEl = document.getElementById('verify-msg');
    if(msgEl) msgEl.textContent = `A verificar na blockchain... (tentativa ${tentativas})`;
    if(tentativas > 180){ // 15 min
      clearInterval(pollInterval);
      if(msgEl) msgEl.textContent = 'Verificação automática a aguardar. A equipa vai confirmar manualmente em breve.';
      return;
    }
    try{
      const s = await apiCall('GET', `/api/pagamento/${pagamentoId}/status`);
      if(s.confirmado){
        clearInterval(pollInterval);
        checkoutStep = 3;
        await loadLojista();
        renderRoot();
      }
    } catch(e){}
  }, 5000);
}

async function enviarMensagemIA(msg,endpoint){
  if(!msg?.trim()||aiCarregando) return;
  const input=document.getElementById('ai-input');
  if(input)input.value='';
  aiHistorico.push({role:'user',content:msg});
  aiCarregando=true;
  renderAIMessages();
  try{
    const r=await apiCall('POST',endpoint,{mensagem:msg,historico:aiHistorico.slice(-10)});
    if(r.success){aiHistorico.push({role:'assistant',content:r.resposta});}
    else{aiHistorico.push({role:'assistant',content:'Erro: '+r.error});}
  }catch(e){aiHistorico.push({role:'assistant',content:'Erro de conexão. Tenta novamente.'});}
  aiCarregando=false;
  renderAIMessages();
}

function renderAIMessages(){
  const el=document.getElementById('ai-messages');
  if(!el) return;
  el.innerHTML=aiHistorico.slice(-20).map(m=>`<div class="ai-msg ${m.role}">${m.role==='assistant'?'<div class="ai-badge">🤖 Gemini AI</div>':''}${escHtml(m.content)}</div>`).join('')
    +(aiCarregando?`<div class="ai-msg assistant"><div class="ai-badge">🤖 Gemini AI</div><div class="spin"></div> A pensar...</div>`:'');
  el.scrollTop=el.scrollHeight;
}

async function doSaque(){
  const carteira=document.getElementById('sw')?.value;
  if(!carteira){document.getElementById('saque-err').innerHTML=`<span style="color:var(--red)">Carteira obrigatória</span>`;return;}
  const btn=document.querySelector('#modal-ct .btn-success');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spin"></div> A processar...';}
  const r=await apiCall('POST','/api/afiliado/saque',{carteira_destino:carteira});
  if(r.success){
    document.getElementById('saque-err').innerHTML=r.manual?
      `<div class="alert a-gold">⏳ ${r.message}</div>`:
      `<div class="alert a-green">✓ Enviado! TX: ${r.tx_hash?.substring(0,20)||'—'}</div>`;
    await loadAfiliado();
    setTimeout(closeModal,2000);
  } else {
    document.getElementById('saque-err').innerHTML=`<span style="color:var(--red)">${r.error}</span>`;
    if(btn){btn.disabled=false;btn.textContent='Confirmar Saque';}
  }
}

    <div class="fr f1"><div class="lbl">Nome da Plataforma</div><input id="cnp" value="${c.nome_plataforma||'3DigitalShop'}"></div>
    <div class="fr f1"><div class="lbl">Taxa Comissão Afiliado (%)</div><input id="cca" type="number" step="0.1" value="${c.comissao_afiliado||10}"></div>
  </div>
  <div class="fr"><div class="lbl">xRocket API Key</div><input id="crk" value="${c.xrocket_api_key||''}"></div>
  <div class="fr"><div class="lbl">Anthropic API Key (Gemini AI)</div><input id="cak" type="password" value="${c.anthropic_api_key||''}" placeholder="AIzaSy..."></div>
  <div class="row">
    <div class="fr f1"><div class="lbl">Taxa câmbio TON/USD</div><input id="ctr" type="number" step="0.01" value="${c.ton_usd_rate||5}"></div>
    <div class="fr f1"><div class="lbl">Taxa de Rede TON</div><input id="ctn" type="number" step="0.001" value="${c.taxa_rede_ton||0.01}"></div>
  </div>
  <div id="adm-msg" style="font-size:12px;margin-bottom:8px"></div>
  <button class="btn btn-primary btn-sm" onclick="saveAdminConfig()">Guardar Configurações</button>
  </div>`;
}

async function saveAdminConfig(){
  const r=await apiCall('PUT','/api/admin/config',{
    nome_plataforma:document.getElementById('cnp')?.value,
    xrocket_api_key:document.getElementById('crk')?.value,
    anthropic_api_key:document.getElementById('cak')?.value,
    ton_usd_rate:parseFloat(document.getElementById('ctr')?.value),
    comissao_afiliado:parseFloat(document.getElementById('cca')?.value),
    taxa_rede_ton:parseFloat(document.getElementById('ctn')?.value),
  });
  const msg=document.getElementById('adm-msg');
  if(msg)msg.innerHTML=r.success?`<span style="color:var(--green)">✓ Guardado</span>`:`<span style="color:var(--red)">${r.error}</span>`;
}


// ════════════════════════════════════════════════════════
// ADMIN — Carteira xRocket
// ════════════════════════════════════════════════════════
async function rAdminCarteira(){
  const ct=document.getElementById('ct');
  if(ct) ct.innerHTML=`<div style="text-align:center;padding:40px"><div class="spin" style="width:30px;height:30px;border-width:3px;margin:0 auto 12px"></div><div style="color:var(--muted);font-size:13px">A carregar carteira xRocket...</div></div>`;

  const r=await apiCall('GET','/api/admin/xrocket/carteira');
  if(!r.success) return `<div class="alert a-red"><span>✕</span><span>${r.error||'Erro ao carregar carteira'}</span></div>`;

  const moedas=r.moedas||[];
  const comSaldo=moedas.filter(m=>m.saldo>0);
  const totalTON=moedas.find(m=>m.currency==='TONCOIN')?.saldo||0;

  // Ícones por moeda
  const icons={TONCOIN:'💎',USDT:'💵',NOT:'🪙',DOGS:'🐶',BTC:'₿',ETH:'Ξ',BOLT:'⚡',XROCK:'🚀'};

  return `<div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div>
      <h2 style="font-size:20px;font-weight:700;margin-bottom:3px">💎 Carteira xRocket</h2>
      <div style="font-size:12px;color:var(--muted)">${r.app_nome||'App'} · Taxa: ${r.app_fee||0}% · ${r.total_moedas||0} moedas disponíveis</div>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="tab='carteira';renderRoot()">🔄 Actualizar</button>
  </div>

  <!-- Saldos com valor -->
  ${comSaldo.length?`
  <div style="margin-bottom:20px">
    <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Saldos Actuais</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">
      ${comSaldo.map(m=>`
      <div class="card" style="padding:14px;border-left:3px solid var(--${m.currency==='TONCOIN'?'accent':'green'})">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:22px">${icons[m.currency]||'🔸'}</span>
          <div>
            <div style="font-weight:700;font-size:13px">${m.currency}</div>
            <div style="font-size:10px;color:var(--muted)">${m.nome||''}</div>
          </div>
        </div>
        <div style="font-size:22px;font-weight:800;color:var(--accent)">${parseFloat(m.saldo).toFixed(4)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${m.currency}</div>
        ${m.deposito?.endereco?`
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
          <div style="font-size:10px;font-weight:600;color:var(--muted);margin-bottom:4px">ENDEREÇO DE DEPÓSITO</div>
          <div style="display:flex;align-items:center;gap:5px">
            <div style="font-family:monospace;font-size:10px;color:var(--accent);flex:1;word-break:break-all;line-height:1.4">${m.deposito.endereco}</div>
            <button class="copy-btn" style="flex-shrink:0" onclick="copyText('${m.deposito.endereco}')">⎘</button>
          </div>
          ${m.deposito.memo?`<div style="font-size:10px;color:var(--muted);margin-top:4px">MEMO: <strong>${m.deposito.memo}</strong></div>`:''}
        </div>`:''}
      </div>`).join('')}
    </div>
  </div>`:`
  <div class="alert a-gold" style="margin-bottom:16px"><span>ℹ</span><span>Nenhum saldo activo na carteira xRocket.</span></div>`}

  <!-- Todas as moedas com endereços -->
  <div>
    <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">
      Todas as Moedas — Endereços de Depósito (${moedas.length})
    </div>
    <div class="card" style="padding:0">
    <div class="tw"><table>
      <thead><tr><th>Moeda</th><th>Nome</th><th>Saldo</th><th>Endereço de Depósito</th><th>Memo/Tag</th><th>Redes</th><th>Min. Saque</th></tr></thead>
      <tbody>
        ${moedas.map(m=>`<tr>
          <td>
            <div style="display:flex;align-items:center;gap:7px">
              <span style="font-size:18px">${icons[m.currency]||'🔸'}</span>
              <span style="font-weight:700;font-size:13px">${m.currency}</span>
            </div>
          </td>
          <td style="font-size:12px;color:var(--muted)">${m.nome||'—'}</td>
          <td style="font-weight:${m.saldo>0?'700':'400'};color:${m.saldo>0?'var(--accent)':'var(--dim)'}">
            ${m.saldo>0?parseFloat(m.saldo).toFixed(6):'—'}
          </td>
          <td style="max-width:220px">
            ${m.deposito?.endereco?`
            <div style="display:flex;align-items:center;gap:5px">
              <div style="font-family:monospace;font-size:10px;color:var(--text2);flex:1;word-break:break-all;line-height:1.4">${m.deposito.endereco}</div>
              <button class="copy-btn" onclick="copyText('${m.deposito.endereco}')">⎘</button>
            </div>`:`<span style="color:var(--dim);font-size:12px">—</span>`}
          </td>
          <td style="font-family:monospace;font-size:11px;color:var(--muted)">
            ${m.deposito?.memo||'—'}
          </td>
          <td style="font-size:11px">
            ${(m.redes||[]).map(n=>`<div style="margin-bottom:2px"><span class="badge b-dim" style="font-size:9px">${n.codigo}</span> <span style="color:var(--muted)">${n.fee?n.fee+' '+n.fee_moeda:''}</span></div>`).join('')||'—'}
          </td>
          <td style="font-size:12px;color:var(--muted)">${m.min_saque||'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div></div>
  </div>

  </div>`;
}

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('modal-ct').innerHTML='';}
function copyText(t){navigator.clipboard?.writeText(t).catch(()=>{const el=document.createElement('textarea');el.value=t;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);});showToast('✓ Copiado!');}
function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--text);color:var(--white);padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:999;box-shadow:var(--shadow-md);animation:fadeIn .25s ease';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}
